<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Billetes - Serie B</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Verificador Serie B</h1>
            <p>Billetes de Bolivia 2026</p>
        </header>

        <section class="selection-section">
            <p>1. Selecciona el valor del billete:</p>
            <div class="button-group">
                <button class="btn-val" onclick="seleccionarBillete(10)">Bs 10</button>
                <button class="btn-val" onclick="seleccionarBillete(20)">Bs 20</button>
                <button class="btn-val" onclick="seleccionarBillete(50)">Bs 50</button>
            </div>
        </section>

        <section id="scanner-section" style="display:none;">
            <div class="camera-wrapper">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none;"></canvas>
                <div class="scan-guide"></div>
            </div>
            
            <button id="btn-scan" class="btn-action">ESCANEAR NÚMERO</button>
        </section>

        <section id="result-area">
            <div id="status">Selecciona una denominación para empezar</div>
            <div id="number-display">-- -- --</div>
        </section>
        
        <button id="btn-reset" class="btn-reset" onclick="window.location.reload()" style="display:none;">Verificar otro billete</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
