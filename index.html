<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Scanner Pro - Serie B</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/html5-qrcode"></script>
  </head>
  <body>
    <div class="app-container">
      <div id="view-scanner">
        <header class="scan-header">
          <div class="status-badge">AUTO-ESCÁNER ACTIVO</div>
          <h1>Apunta al código del billete</h1>
          <p>Serie B · Bolivia 2026</p>
        </header>

        <div class="camera-box">
          <div id="reader"></div>
          <div class="radar-overlay">
            <div class="reticle">
              <div class="laser"></div>
            </div>
          </div>
        </div>

        <footer class="scan-footer">
          <div class="hint">Compatible con códigos QR y barras</div>
        </footer>
      </div>

      <div id="view-result" class="hidden">
        <div class="result-card">
          <div id="res-icon"></div>
          <h2 id="res-title">Analizando...</h2>
          <div class="res-amount" id="res-val">Bs --</div>

          <div class="res-info">
            <span>Nº SERIE DETECTADO:</span>
            <strong id="res-serial">--------</strong>
          </div>

          <div id="res-msg">Validando con BCB...</div>

          <button class="btn-retry" onclick="resetScanner()">
            ESCANEAR OTRO
          </button>
        </div>
      </div>
    </div>

    <audio
      id="beep"
      src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script src="app.js"></script>
  </body>
</html>
