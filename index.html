<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Scanner Serie B - Bolivia</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap");

      :root {
        --accent: #1d1d1f;
        --bg: #f8f9fb;
      }

      body {
        font-family: "Outfit", sans-serif;
        background: var(--bg);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: background 0.4s ease;
      }

      header {
        padding: 40px 20px 10px;
        text-align: center;
      }

      header h1 {
        font-weight: 900;
        font-size: 1.6rem;
        margin: 0;
        color: var(--accent);
        transition: color 0.4s ease;
        letter-spacing: -1px;
      }

      /* Selector de Billetes */
      .selector {
        display: flex;
        background: #ebebeb;
        padding: 5px;
        border-radius: 20px;
        margin: 20px 0;
        gap: 5px;
      }

      .monto-btn {
        padding: 12px 25px;
        border-radius: 15px;
        border: none;
        font-weight: 700;
        cursor: pointer;
        color: #636366;
        background: transparent;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .monto-btn.active[data-v="10"] {
        background: white;
        color: #007aff;
        box-shadow: 0 4px 10px rgba(0, 122, 255, 0.15);
      }
      .monto-btn.active[data-v="20"] {
        background: white;
        color: #ff9500;
        box-shadow: 0 4px 10px rgba(255, 149, 0, 0.15);
      }
      .monto-btn.active[data-v="50"] {
        background: white;
        color: #8e44ad;
        box-shadow: 0 4px 10px rgba(142, 68, 173, 0.15);
      }

      /* Visor de Cámara */
      .camera-container {
        position: relative;
        width: 320px;
        height: 320px;
        border-radius: 40px;
        overflow: hidden;
        background: #000;
        border: 2px solid var(--accent);
        transition: border-color 0.4s ease;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Capa de enfoque */
      .focus-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: inset 0 0 0 1000px rgba(0, 0, 0, 0.5); /* Oscurece el resto */
      }

      /* EL RECUADRO QUE CAMBIA DE COLOR */
      .focus-box {
        width: 260px;
        height: 75px;
        border: 3px solid var(--accent); /* Vinculado al color dinámico */
        border-radius: 18px;
        position: relative;
        transition: border-color 0.4s ease;
        background: rgba(255, 255, 255, 0.05);
      }

      /* Animación Láser */
      .laser {
        position: absolute;
        width: 90%;
        left: 5%;
        height: 2px;
        background: var(--accent);
        box-shadow: 0 0 15px var(--accent);
        top: 15%;
        opacity: 0;
        transition:
          opacity 0.3s,
          background 0.4s;
      }

      .scanning .laser {
        opacity: 1;
        animation: scanMove 1.8s infinite ease-in-out;
      }

      @keyframes scanMove {
        0%,
        100% {
          top: 15%;
        }
        50% {
          top: 85%;
        }
      }

      /* Botón de Acción */
      .btn-scan {
        margin-top: 35px;
        width: 320px;
        padding: 20px;
        border-radius: 25px;
        border: none;
        background: var(--accent);
        color: white;
        font-size: 1.1rem;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
      }

      .btn-scan:disabled {
        background: #d1d1d6;
        color: #8e8e93;
        cursor: not-allowed;
      }
      .btn-scan:active {
        transform: scale(0.96);
      }

      /* Resultado Premium */
      .result-sheet {
        position: fixed;
        bottom: -100%;
        left: 0;
        width: 100%;
        background: white;
        padding: 40px 20px;
        border-top-left-radius: 35px;
        border-top-right-radius: 35px;
        box-shadow: 0 -15px 50px rgba(0, 0, 0, 0.15);
        text-align: center;
        transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 200;
        box-sizing: border-box;
      }

      .result-sheet.show {
        bottom: 0;
      }
      .res-code {
        font-size: 2.8rem;
        font-weight: 900;
        color: var(--accent);
        margin: 10px 0;
        letter-spacing: -1px;
      }

      .btn-close {
        margin-top: 20px;
        padding: 16px 50px;
        border-radius: 20px;
        border: none;
        font-weight: 800;
        background: #f2f2f7;
        color: #1d1d1f;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="mainTitle">VERIFICADOR OFICIAL</h1>
      <p>Escanee el código de serie lateral</p>
    </header>

    <div class="selector">
      <button class="monto-btn" data-v="10" onclick="applyTheme(10, '#007AFF')">
        Bs 10
      </button>
      <button class="monto-btn" data-v="20" onclick="applyTheme(20, '#FF9500')">
        Bs 20
      </button>
      <button class="monto-btn" data-v="50" onclick="applyTheme(50, '#8E44AD')">
        Bs 50
      </button>
    </div>

    <div class="camera-container" id="camFrame">
      <video id="webcam" autoplay playsinline></video>
      <div class="focus-overlay">
        <div class="focus-box" id="scannerBox">
          <div class="laser"></div>
        </div>
      </div>
    </div>

    <button class="btn-scan" id="scanBtn" onclick="readSerial()" disabled>
      ELIJA DENOMINACIÓN
    </button>

    <div class="result-sheet" id="sheet">
      <div
        id="statusTag"
        style="font-weight: 900; font-size: 0.9rem; letter-spacing: 1px"></div>
      <div class="res-code" id="resVal"></div>
      <p
        id="resInfo"
        style="color: #666; margin-bottom: 25px; line-height: 1.5"></p>
      <button class="btn-close" onclick="hideSheet()">ENTENDIDO</button>
    </div>

    <canvas id="cropCanvas" style="display: none"></canvas>

    <script>
      let currentMonto = null;
      const ROBADOS = [
        { denom: 10, inicio: 77100001, fin: 77550000 },
        { denom: 10, inicio: 78000001, fin: 78450000 },
        { denom: 10, inicio: 78900001, fin: 96350000 },
        { denom: 10, inicio: 96350001, fin: 96800000 },
        { denom: 10, inicio: 96800001, fin: 97250000 },
        { denom: 10, inicio: 98150001, fin: 98600000 },
        { denom: 10, inicio: 104900001, fin: 105350000 },
        { denom: 10, inicio: 105350001, fin: 105800000 },
        { denom: 10, inicio: 106700001, fin: 107150000 },
        { denom: 10, inicio: 107600001, fin: 108050000 },
        { denom: 10, inicio: 108050001, fin: 108500000 },
        { denom: 10, inicio: 109400001, fin: 109850000 },
        { denom: 20, inicio: 87280145, fin: 91646549 },
        { denom: 20, inicio: 96650001, fin: 97100000 },
        { denom: 20, inicio: 99800001, fin: 100250000 },
        { denom: 20, inicio: 100250001, fin: 100700000 },
        { denom: 20, inicio: 109250001, fin: 109700000 },
        { denom: 20, inicio: 110600001, fin: 111050000 },
        { denom: 20, inicio: 111050001, fin: 111500000 },
        { denom: 20, inicio: 111950001, fin: 112400000 },
        { denom: 20, inicio: 112400001, fin: 112850000 },
        { denom: 20, inicio: 112850001, fin: 113300000 },
        { denom: 20, inicio: 114200001, fin: 114650000 },
        { denom: 20, inicio: 114650001, fin: 115100000 },
        { denom: 20, inicio: 115100001, fin: 115550000 },
        { denom: 20, inicio: 118700001, fin: 119150000 },
        { denom: 20, inicio: 119150001, fin: 119600000 },
        { denom: 20, inicio: 120500001, fin: 120950000 },
        { denom: 50, inicio: 67250001, fin: 67700000 },
        { denom: 50, inicio: 69050001, fin: 69500000 },
        { denom: 50, inicio: 69500001, fin: 69950000 },
        { denom: 50, inicio: 69950001, fin: 70400000 },
        { denom: 50, inicio: 70400001, fin: 70850000 },
        { denom: 50, inicio: 70850001, fin: 71300000 },
        { denom: 50, inicio: 76310012, fin: 85139995 },
        { denom: 50, inicio: 86400001, fin: 86850000 },
        { denom: 50, inicio: 90900001, fin: 91350000 },
        { denom: 50, inicio: 91800001, fin: 92250000 },
      ];

      function applyTheme(v, color) {
        currentMonto = v;
        document.documentElement.style.setProperty("--accent", color);

        document
          .querySelectorAll(".monto-btn")
          .forEach((btn) => btn.classList.remove("active"));
        document.querySelector(`[data-v="${v}"]`).classList.add("active");

        const scanBtn = document.getElementById("scanBtn");
        scanBtn.disabled = false;
        scanBtn.innerText = `ANALIZAR BILLETE DE ${v}`;

        if (!window.streamActive) {
          navigator.mediaDevices
            .getUserMedia({ video: { facingMode: "environment" } })
            .then((s) => {
              document.getElementById("webcam").srcObject = s;
              window.streamActive = true;
            });
        }
      }

      async function readSerial() {
        const frame = document.getElementById("camFrame");
        frame.classList.add("scanning");
        document.getElementById("scanBtn").innerText = "PROCESANDO...";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("cropCanvas");
        const ctx = canvas.getContext("2d");

        // Captura mejorada (Aumentamos resolución para OCR)
        canvas.width = 800;
        canvas.height = 200;
        ctx.drawImage(
          video,
          video.videoWidth / 4,
          video.videoHeight / 2 - 50,
          video.videoWidth / 2,
          100,
          0,
          0,
          800,
          200,
        );

        // Procesamiento de imagen (Grises + Contraste)
        let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let pixels = imgData.data;
        for (let i = 0; i < pixels.length; i += 4) {
          let grayscale =
            pixels[i] * 0.3 + pixels[i + 1] * 0.59 + pixels[i + 2] * 0.11;
          let val = grayscale > 125 ? 255 : 0; // Filtro blanco y negro
          pixels[i] = pixels[i + 1] = pixels[i + 2] = val;
        }
        ctx.putImageData(imgData, 0, 0);

        try {
          const result = await Tesseract.recognize(canvas, "eng", {
            tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789",
          });

          const rawText = result.data.text.replace(/\s/g, "");
          const match = rawText.match(/([A-Z])(\d{7,9})/i);

          if (match) {
            showFinalAlert(match[1].toUpperCase(), match[2]);
          } else {
            alert(
              "Lectura fallida. Asegúrese de que el número esté bien iluminado y dentro del recuadro.",
            );
          }
        } catch (e) {
          console.error(e);
        }

        frame.classList.remove("scanning");
        document.getElementById("scanBtn").innerText =
          `ANALIZAR BILLETE DE ${currentMonto}`;
      }

      function showFinalAlert(letra, serie) {
        const num = parseInt(serie);
        const isBad =
          letra === "B" &&
          ROBADOS.some(
            (r) => r.denom === currentMonto && num >= r.inicio && num <= r.fin,
          );

        const sheet = document.getElementById("sheet");
        const tag = document.getElementById("statusTag");

        tag.innerText = isBad
          ? "🚨 ALERTA DE SEGURIDAD"
          : "✅ VERIFICACIÓN EXITOSA";
        tag.style.color = isBad ? "#FF3B30" : "#34C759";

        document.getElementById("resVal").innerText = `${letra}${serie}`;
        document.getElementById("resInfo").innerText = isBad
          ? "ATENCIÓN: Este billete pertenece a las series robadas. No acepte el billete y reporte a las autoridades."
          : "El billete no presenta reportes de robo. Verifique de todos modos los otros elementos de seguridad.";

        sheet.classList.add("show");
      }

      function hideSheet() {
        document.getElementById("sheet").classList.remove("show");
      }
    </script>
  </body>
</html>
