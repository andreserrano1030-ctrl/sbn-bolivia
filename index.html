<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escáner de Billetes - Serie B</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Verificador Serie B</h1>

      <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display: none"></canvas>
        <div class="overlay"></div>
      </div>

      <div class="controls">
        <button id="start-camera">Activar Cámara</button>
        <button id="scan-btn" disabled>Escanear Serie</button>
      </div>

      <div id="result-container">
        <p>Resultado: <span id="status">Esperando...</span></p>
        <h2 id="detected-text">- - -</h2>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
