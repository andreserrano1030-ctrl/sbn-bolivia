<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Escáner Serie B</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  </head>
  <body>
    <div class="app">
      <div class="controls">
        <button class="btn-amt b10" onclick="selectDenom(10)">Bs 10</button>
        <button class="btn-amt b20" onclick="selectDenom(20)">Bs 20</button>
        <button class="btn-amt b50" onclick="selectDenom(50)">Bs 50</button>
      </div>

      <div class="viewport">
        <video id="video" autoplay playsinline></video>
        <div class="overlay">
          <div class="scan-window" id="scanWindow">
            <div class="laser"></div>
          </div>
        </div>
        <canvas id="canvas" style="display: none"></canvas>
      </div>

      <div class="bottom-panel">
        <button id="btnScan" class="btn-scan" disabled>ESCANEAR AHORA</button>
        <div id="result">
          <p id="status">Selecciona un monto arriba</p>
          <h2 id="serial">--------</h2>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
