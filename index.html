<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BCB Sentinel - Serie B</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;600;800&display=swap");

      :root {
        --accent: #007aff;
        --bg: #09090b;
        --card: #18181b;
        --safe: #22c55e;
        --danger: #ef4444;
        --text: #fafafa;
      }

      body {
        font-family: "Outfit", sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* --- Estética de Alta Gama --- */
      header {
        width: 100%;
        padding: 30px 0;
        text-align: center;
        background: linear-gradient(to bottom, #111, transparent);
      }

      h1 {
        font-weight: 800;
        font-size: 1.2rem;
        letter-spacing: 2px;
        margin: 0;
        color: var(--accent);
        transition: 0.3s;
      }
      .sub {
        font-size: 0.7rem;
        color: #71717a;
        text-transform: uppercase;
        margin-top: 5px;
        letter-spacing: 1px;
      }

      /* --- Selector Segmentado --- */
      .selector {
        display: flex;
        background: #27272a;
        padding: 4px;
        border-radius: 14px;
        margin: 20px 0;
      }

      .monto-btn {
        padding: 10px 22px;
        border-radius: 10px;
        border: none;
        font-weight: 700;
        cursor: pointer;
        color: #a1a1aa;
        background: transparent;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .monto-btn.active[data-v="10"] {
        background: var(--accent);
        color: white;
        box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
      }
      .monto-btn.active[data-v="20"] {
        background: #f97316;
        color: white;
        box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4);
      }
      .monto-btn.active[data-v="50"] {
        background: #a855f7;
        color: white;
        box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
      }

      /* --- Controles de Energía --- */
      .controls {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
      }
      .btn-icon {
        background: #27272a;
        border: 1px solid #3f3f46;
        color: white;
        padding: 10px 15px;
        border-radius: 12px;
        font-size: 0.8rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* --- Scanner Pro --- */
      .viewport {
        position: relative;
        width: 330px;
        height: 330px;
        border-radius: 40px;
        border: 2px solid #3f3f46;
        overflow: hidden;
        background: #000;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.7;
      }

      .scan-layer {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.8);
      }

      .focus-frame {
        width: 260px;
        height: 80px;
        border: 2px solid var(--accent);
        border-radius: 16px;
        position: relative;
        background: rgba(255, 255, 255, 0.02);
        transition: 0.3s;
      }

      .laser {
        position: absolute;
        width: 100%;
        height: 2px;
        background: var(--accent);
        box-shadow: 0 0 15px var(--accent);
        top: 0;
        animation: moveLaser 2s infinite linear;
      }

      @keyframes moveLaser {
        0% {
          top: 0;
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          top: 100%;
          opacity: 0;
        }
      }

      /* --- Panel de Historial (Drawer) --- */
      #historyPanel {
        position: fixed;
        right: -100%;
        top: 0;
        width: 85%;
        height: 100%;
        background: var(--card);
        z-index: 1000;
        transition: 0.4s ease;
        padding: 25px;
        box-sizing: border-box;
        box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
      }

      #historyPanel.open {
        right: 0;
      }
      .hist-item {
        background: #27272a;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 10px;
        border-left: 4px solid var(--accent);
      }

      /* --- Alerta de Resultado --- */
      .sheet {
        position: fixed;
        bottom: -100%;
        left: 0;
        width: 100%;
        background: var(--card);
        padding: 40px 20px;
        border-radius: 30px 30px 0 0;
        text-align: center;
        transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1100;
      }

      .sheet.active {
        bottom: 0;
      }
      .code-display {
        font-family: "JetBrains Mono", monospace;
        font-size: 2.2rem;
        font-weight: 700;
        margin: 15px 0;
      }
      .badge {
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="brand">BCB SENTINEL</h1>
      <div class="sub">Validación Profesional de Seguridad</div>
    </header>

    <div class="selector">
      <button class="monto-btn" data-v="10" onclick="setMode(10, '#007AFF')">
        Bs 10
      </button>
      <button class="monto-btn" data-v="20" onclick="setMode(20, '#f97316')">
        Bs 20
      </button>
      <button class="monto-btn" data-v="50" onclick="setMode(50, '#a855f7')">
        Bs 50
      </button>
    </div>

    <div class="controls">
      <button class="btn-icon" onclick="togglePower()">
        <span id="pwrIcon">⭕</span> <span id="pwrText">ACTIVAR LENTE</span>
      </button>
      <button class="btn-icon" onclick="toggleHistory(true)">
        📊 HISTORIAL
      </button>
    </div>

    <div class="viewport">
      <video id="cam" autoplay playsinline></video>
      <div class="scan-layer">
        <div class="focus-frame" id="fFrame">
          <div class="laser"></div>
        </div>
        <p
          id="scanStatus"
          style="font-size: 0.6rem; color: #71717a; margin-top: 15px">
          ESPERANDO DENOMINACIÓN...
        </p>
      </div>
    </div>

    <div id="historyPanel">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 20px;
        ">
        <h2 style="margin: 0">Historial</h2>
        <button
          onclick="toggleHistory(false)"
          style="
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
          ">
          ×
        </button>
      </div>
      <div id="histList"></div>
      <button
        onclick="clearHist()"
        style="
          width: 100%;
          margin-top: 20px;
          padding: 10px;
          border-radius: 10px;
          border: none;
          background: #ef4444;
          color: white;
          font-weight: 700;
        ">
        BORRAR TODO
      </button>
    </div>

    <div class="sheet" id="resultSheet">
      <div id="badge" class="badge"></div>
      <div class="code-display" id="resCode">-------</div>
      <p id="resVerdict" style="color: #a1a1aa; line-height: 1.6"></p>
      <button
        onclick="closeResult()"
        style="
          width: 100%;
          padding: 18px;
          border-radius: 18px;
          border: none;
          background: var(--accent);
          color: white;
          font-weight: 800;
          font-size: 1rem;
          margin-top: 20px;
        ">
        NUEVO ESCANEO
      </button>
    </div>

    <canvas id="c" style="display: none"></canvas>

    <script>
      let activeMonto = null;
      let isLive = false;
      let stream = null;
      let scanning = false;

      const ROBADOS = [
        { denom: 10, inicio: 77100001, fin: 77550000 },
        { denom: 10, inicio: 78000001, fin: 78450000 },
        { denom: 10, inicio: 78900001, fin: 96350000 },
        { denom: 10, inicio: 96350001, fin: 96800000 },
        { denom: 10, inicio: 96800001, fin: 97250000 },
        { denom: 10, inicio: 98150001, fin: 98600000 },
        { denom: 10, inicio: 104900001, fin: 105350000 },
        { denom: 10, inicio: 105350001, fin: 105800000 },
        { denom: 10, inicio: 106700001, fin: 107150000 },
        { denom: 10, inicio: 107600001, fin: 108050000 },
        { denom: 10, inicio: 108050001, fin: 108500000 },
        { denom: 10, inicio: 109400001, fin: 109850000 },
        { denom: 20, inicio: 87280145, fin: 91646549 },
        { denom: 20, inicio: 96650001, fin: 97100000 },
        { denom: 20, inicio: 99800001, fin: 100250000 },
        { denom: 20, inicio: 100250001, fin: 100700000 },
        { denom: 20, inicio: 109250001, fin: 109700000 },
        { denom: 20, inicio: 110600001, fin: 111050000 },
        { denom: 20, inicio: 111050001, fin: 111500000 },
        { denom: 20, inicio: 111950001, fin: 112400000 },
        { denom: 20, inicio: 112400001, fin: 112850000 },
        { denom: 20, inicio: 112850001, fin: 113300000 },
        { denom: 20, inicio: 114200001, fin: 114650000 },
        { denom: 20, inicio: 114650001, fin: 115100000 },
        { denom: 20, inicio: 115100001, fin: 115550000 },
        { denom: 20, inicio: 118700001, fin: 119150000 },
        { denom: 20, inicio: 119150001, fin: 119600000 },
        { denom: 20, inicio: 120500001, fin: 120950000 },
        { denom: 50, inicio: 67250001, fin: 67700000 },
        { denom: 50, inicio: 69050001, fin: 69500000 },
        { denom: 50, inicio: 69500001, fin: 69950000 },
        { denom: 50, inicio: 69950001, fin: 70400000 },
        { denom: 50, inicio: 70400001, fin: 70850000 },
        { denom: 50, inicio: 70850001, fin: 71300000 },
        { denom: 50, inicio: 76310012, fin: 85139995 },
        { denom: 50, inicio: 86400001, fin: 86850000 },
        { denom: 50, inicio: 90900001, fin: 91350000 },
        { denom: 50, inicio: 91800001, fin: 92250000 },
      ];

      function setMode(v, color) {
        activeMonto = v;
        document.documentElement.style.setProperty("--accent", color);
        document
          .querySelectorAll(".monto-btn")
          .forEach((b) => b.classList.remove("active"));
        document.querySelector(`[data-v="${v}"]`).classList.add("active");
        document.getElementById("scanStatus").innerText =
          "ESCANEANDO AUTOMÁTICAMENTE...";
        if (isLive) startLoop();
      }

      async function togglePower() {
        const video = document.getElementById("cam");
        if (!isLive) {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", focusMode: "continuous" },
          });
          video.srcObject = stream;
          isLive = true;
          document.getElementById("pwrText").innerText = "APAGAR LENTE";
          document.getElementById("pwrIcon").innerText = "🟢";
          if (activeMonto) startLoop();
        } else {
          stream.getTracks().forEach((t) => t.stop());
          video.srcObject = null;
          isLive = false;
          scanning = false;
          document.getElementById("pwrText").innerText = "ACTIVAR LENTE";
          document.getElementById("pwrIcon").innerText = "⭕";
        }
      }

      function startLoop() {
        if (scanning || !isLive) return;
        scanning = true;
        process();
      }

      async function process() {
        if (!scanning) return;
        const video = document.getElementById("cam");
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        canvas.width = 500;
        canvas.height = 120;
        ctx.drawImage(
          video,
          video.videoWidth / 4,
          video.videoHeight / 2 - 60,
          video.videoWidth / 2,
          120,
          0,
          0,
          500,
          120,
        );

        try {
          const {
            data: { text },
          } = await Tesseract.recognize(canvas, "eng", {
            tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789",
          });
          const match = text.replace(/\s/g, "").match(/([A-Z])(\d{7,9})/i);

          if (match) {
            analyze(match[1].toUpperCase(), match[2]);
          } else {
            setTimeout(process, 600);
          }
        } catch (e) {
          setTimeout(process, 600);
        }
      }

      function analyze(letra, serie) {
        scanning = false;
        const num = parseInt(serie);
        let status = "LEGAL";
        let color = "var(--safe)";

        // Regla de patrón: Los billetes de Bolivia deben ser letra 'A' o 'B' y tener 8 dígitos.
        const patternLegal =
          (letra === "A" || letra === "B") && serie.length >= 8;
        const isRobado =
          letra === "B" &&
          ROBADOS.some(
            (r) => r.denom === activeMonto && num >= r.inicio && num <= r.fin,
          );

        if (!patternLegal) {
          status = "ILEGAL / FALSO";
          color = "var(--danger)";
        } else if (isRobado) {
          status = "ROBADO (SERIE B)";
          color = "var(--danger)";
        }

        showResult(letra + serie, status, color);
        saveToHistory(letra + serie, status);
      }

      function showResult(code, status, color) {
        const sheet = document.getElementById("resultSheet");
        const badge = document.getElementById("badge");

        badge.innerText = status;
        badge.style.background = color;
        document.getElementById("resCode").innerText = code;
        document.getElementById("resCode").style.color = color;
        document.getElementById("resVerdict").innerText = status.includes(
          "ROBADO",
        )
          ? "ESTA SERIE ESTÁ REPORTADA. NO ACEPTE EL BILLETE."
          : "EL FORMATO Y SERIE PARECEN CORRECTOS.";

        sheet.classList.add("active");
      }

      function saveToHistory(code, status) {
        const hist = JSON.parse(localStorage.getItem("bcb_hist") || "[]");
        hist.unshift({ code, status, time: new Date().toLocaleTimeString() });
        localStorage.setItem("bcb_hist", JSON.stringify(hist.slice(0, 20)));
        renderHistory();
      }

      function renderHistory() {
        const hist = JSON.parse(localStorage.getItem("bcb_hist") || "[]");
        document.getElementById("histList").innerHTML = hist
          .map(
            (i) => `
            <div class="hist-item" style="border-color: ${i.status.includes("LEGAL") ? "var(--safe)" : "var(--danger)"}">
                <div style="display:flex; justify-content:space-between; font-size:0.8rem">
                    <b>${i.code}</b> <span>${i.time}</span>
                </div>
                <div style="font-size:0.7rem; margin-top:5px; color:#a1a1aa">${i.status}</div>
            </div>
        `,
          )
          .join("");
      }

      function toggleHistory(show) {
        document.getElementById("historyPanel").classList.toggle("open", show);
      }
      function closeResult() {
        document.getElementById("resultSheet").classList.remove("active");
        scanning = true;
        process();
      }
      function clearHist() {
        localStorage.removeItem("bcb_hist");
        renderHistory();
      }

      renderHistory();
    </script>
  </body>
</html>
